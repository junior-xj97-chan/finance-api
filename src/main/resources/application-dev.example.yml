# ============================================================
# 开发环境配置模板
# 使用说明：
# 1. 复制此文件为 application-dev.yml
# 2. 填入实际的配置值
# ============================================================

tushare:
  # Tushare Pro Token（必填）
  # 获取地址：https://tushare.pro/register
  # 免费注册后默认有 100 积分，可访问 stock_basic 等基础接口
  token: YOUR_TUSHARE_TOKEN_HERE

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/finance_api?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.finance.api: debug
    com.finance.api.mapper: debug

server:
  port: 8080
